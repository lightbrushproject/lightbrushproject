<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Lightbrush 3D contribution graph placeholder</title>
  <desc id="desc">Temporary 3D contribution graph placeholder. GitHub Actions replaces this with a generated graph.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#080808"/>
      <stop offset="1" stop-color="#151515"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" x2="1">
      <stop offset="0" stop-color="#8deaff"/>
      <stop offset=".5" stop-color="#ff3d7f"/>
      <stop offset="1" stop-color="#ff9c2f"/>
    </linearGradient>
  </defs>
  <rect width="980" height="360" rx="8" fill="url(#bg)"/>
  <path d="M90 250 310 130 520 220 735 92 890 165" fill="none" stroke="url(#rail)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#f5f1e8" font-family="Verdana, sans-serif">
    <text x="90" y="86" font-size="28" font-weight="700">3D contribution graph warming up</text>
    <text x="90" y="124" font-size="16" opacity=".72">GitHub Actions will replace this placeholder after the first workflow run.</text>
  </g>
  <g fill="#ff3d7f">
    <circle cx="90" cy="250" r="13"/>
    <circle cx="310" cy="130" r="13"/>
    <circle cx="520" cy="220" r="13"/>
    <circle cx="735" cy="92" r="13"/>
    <circle cx="890" cy="165" r="13"/>
  </g>
</svg>

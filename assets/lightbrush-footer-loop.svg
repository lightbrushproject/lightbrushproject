<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280" role="img" aria-label="Animated chrome Lightbrush loop">
  <defs>
    <linearGradient id="metal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f5f1e8"/>
      <stop offset=".25" stop-color="#8deaff"/>
      <stop offset=".5" stop-color="#080808"/>
      <stop offset=".75" stop-color="#ff3d7f"/>
      <stop offset="1" stop-color="#f5f1e8"/>
    </linearGradient>
    <filter id="blurGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1000" height="280" fill="#080808"/>
  <g transform="translate(500 140)" filter="url(#blurGlow)">
    <animateTransform attributeName="transform" type="scale" values="1;1.035;1" dur="5s" repeatCount="indefinite" additive="sum"/>
    <ellipse rx="310" ry="74" fill="none" stroke="url(#metal)" stroke-width="12"/>
    <ellipse rx="205" ry="49" fill="none" stroke="#f5f1e8" stroke-width="2" stroke-opacity=".55">
      <animate attributeName="stroke-dasharray" values="8 28;70 16;8 28" dur="6s" repeatCount="indefinite"/>
    </ellipse>
    <path d="M-240 0C-120-110 120 110 240 0" fill="none" stroke="#ff9c2f" stroke-width="5" stroke-linecap="round" opacity=".78"/>
    <path d="M-240 0C-120 110 120-110 240 0" fill="none" stroke="#8deaff" stroke-width="5" stroke-linecap="round" opacity=".78"/>
  </g>
  <text x="500" y="153" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#f5f1e8" letter-spacing="8">YOU SHOULD JUST BUILD THINGS</text>
</svg>

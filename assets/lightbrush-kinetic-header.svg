<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">Lightbrush Project kinetic profile header</title>
  <desc id="desc">Animated abstract 3D chrome and neon header for Lightbrush Project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#050505"/>
      <stop offset=".55" stop-color="#11100d"/>
      <stop offset="1" stop-color="#040404"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" x2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".16" stop-color="#8deaff"/>
      <stop offset=".42" stop-color="#f5f1e8"/>
      <stop offset=".68" stop-color="#ff3d7f"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <radialGradient id="flare" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ff3d7f" stop-opacity=".9"/>
      <stop offset=".35" stop-color="#ff9c2f" stop-opacity=".35"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="heavyGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0v48" fill="none" stroke="#f5f1e8" stroke-opacity=".08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1400" height="520" fill="url(#bg)"/>
  <rect width="1400" height="520" fill="url(#grid)"/>
  <circle cx="1110" cy="190" r="300" fill="url(#flare)" filter="url(#heavyGlow)">
    <animate attributeName="r" values="260;330;260" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".75;.95;.75" dur="8s" repeatCount="indefinite"/>
  </circle>

  <g opacity=".95" filter="url(#softGlow)">
    <path d="M846 94c148-46 300 37 339 184 11 43 12 86 4 126" fill="none" stroke="#8deaff" stroke-width="2" stroke-opacity=".52"/>
    <path d="M827 395c-90-117-74-285 41-374" fill="none" stroke="#ff3d7f" stroke-width="2" stroke-opacity=".65"/>
    <path d="M817 252c61-90 187-121 285-67 78 43 118 129 105 212" fill="none" stroke="#f5f1e8" stroke-width="5" stroke-linecap="round" stroke-opacity=".75">
      <animate attributeName="stroke-dasharray" values="20 26;80 16;20 26" dur="7s" repeatCount="indefinite"/>
    </path>
  </g>

  <g transform="translate(995 255)">
    <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="18s" repeatCount="indefinite" additive="sum"/>
    <path d="M0-150 130 75-130 75Z" fill="none" stroke="url(#chrome)" stroke-width="10" stroke-linejoin="round"/>
    <path d="M0-92 78 45-78 45Z" fill="none" stroke="#080808" stroke-width="18" stroke-linejoin="round" opacity=".75"/>
    <circle cx="0" cy="0" r="32" fill="#f5f1e8"/>
    <circle cx="0" cy="0" r="22" fill="#080808"/>
  </g>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#f5f1e8">
    <text x="92" y="188" font-size="34" letter-spacing="7" opacity=".82">LIGHTBRUSH PROJECT</text>
    <text x="88" y="285" font-size="92" font-weight="700">coded spectacle</text>
    <text x="96" y="342" font-size="29" opacity=".82">immersive visuals / real-time systems / 3D motion</text>
  </g>

  <g transform="translate(96 392)" font-family="Verdana, sans-serif" font-size="15" fill="#080808" font-weight="700">
    <rect width="112" height="34" rx="17" fill="#f5f1e8"/>
    <text x="18" y="23">GLSL</text>
    <rect x="126" width="124" height="34" rx="17" fill="#8deaff"/>
    <text x="146" y="23">THREE.JS</text>
    <rect x="264" width="126" height="34" rx="17" fill="#ff3d7f"/>
    <text x="286" y="23">BLENDER</text>
    <rect x="404" width="116" height="34" rx="17" fill="#ff9c2f"/>
    <text x="424" y="23">SHOWS</text>
  </g>
</svg>
